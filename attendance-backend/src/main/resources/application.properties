spring.application.name=smart-attendance

# ──────────────────────────────────────────────
# Database Configuration
# ──────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/snap_attend_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Parth_3010}

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ──────────────────────────────────────────────
# AI Service (Python FastAPI on port 8001)
# ──────────────────────────────────────────────
ai.service.url=http://localhost:8001

# ──────────────────────────────────────────────
# JWT Configuration
# ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET:SmartAttendanceSystemSuperSecretKeyForJWT2026MajorProject!!}
jwt.expiration=86400000

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=8080

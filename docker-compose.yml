version: "3.9"

services:

  # ── MySQL Database ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: smart-attend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"          # 3307 on host → 3306 in container (avoids conflict with local MySQL)
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Python AI Service ───────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smart-attend-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./attendance-backend
      dockerfile: Dockerfile
    container_name: smart-attend-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Override application.properties values for Docker networking
      SPRING_DATASOURCE_URL: ${MYSQL_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  # ── React Frontend (served by Nginx) ────────────────────────────
  frontend:
    build:
      context: ./attendance-frontend
      dockerfile: Dockerfile
    container_name: smart-attend-frontend
    restart: unless-stopped
    ports:
      - "80:80"              # Access at http://localhost (no port needed!)
    depends_on:
      - backend

volumes:
  mysql_data:               # Persists database data between restarts
